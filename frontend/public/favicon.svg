<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    XQT5 favicon — navy "X" + orange "5" subscript.
    Drawn entirely with strokes (no <text>) so rendering does not depend on
    a font being available at favicon scale.
      navy   = #213452 (var(--color-dark))
      orange = #ee7f00 (var(--color-primary))
  -->
  <!-- X: two rounded strokes -->
  <line x1="4"  y1="5"  x2="20" y2="22" stroke="#213452" stroke-width="4.6" stroke-linecap="round" />
  <line x1="20" y1="5"  x2="4"  y2="22" stroke="#213452" stroke-width="4.6" stroke-linecap="round" />

  <!-- 5 (subscript, bottom-right): top bar, left descender, bowl -->
  <path
    d="M22.5 19 H29 M22.5 19 V22.7 H26 Q29.2 22.7 29.2 25.6 Q29.2 28.5 26 28.5 H23"
    stroke="#ee7f00"
    stroke-width="2.3"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
