<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    XQT5 favicon — navy "X" + orange "5" wordmark.
    Strokes only (no <text>) so rendering does not depend on fonts.
      navy   = #213452 (var(--color-dark))
      orange = #ee7f00 (var(--color-primary))
    v3: X stretched vertically (less square), "5" enlarged ~1.7×, both
        sized to read at 16×16. Stroke widths tuned for crisp rendering.
  -->
  <!-- X: two diagonal strokes, taller than wide -->
  <line x1="3" y1="3"  x2="15" y2="26" stroke="#213452" stroke-width="5" stroke-linecap="round" />
  <line x1="15" y1="3" x2="3"  y2="26" stroke="#213452" stroke-width="5" stroke-linecap="round" />

  <!-- 5 (right of X, baseline-aligned): top bar, left descender, bowl, base -->
  <path
    d="M17 7 H29 M17 7 V16.5 H24 Q29 16.5 29 21.25 Q29 26 24 26 H18.5"
    stroke="#ee7f00"
    stroke-width="3.6"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
